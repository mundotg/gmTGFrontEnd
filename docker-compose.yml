version: "3.9"

services:
  front:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mustainfo-front

    ports:
      - "3000:3000"

    volumes:
      - .:/app

    environment:
      NODE_ENV: development
      HOME: /home/user

    command: "npm run dev"

    restart: unless-stopped
    tty: true
    stdin_open: true

volumes:
  node_modules:
